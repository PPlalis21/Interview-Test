services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "@Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  webapp:
    image: interview-test.api
    container_name: webapp
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=InterviewTestDb;User=sa;Password=@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
    depends_on:
      - sqlserver
    ports:
      - "5000:8080"
    build:
      context: .
      dockerfile: Interview-Test.Api/Dockerfile

  gateway:
    image: interview-test.gateway
    container_name: gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - webapp
    ports:
      - "44375:8080"
    build:
      context: .
      dockerfile: Interview-Test.GatewayApi/Dockerfile

  frontend:
    image: interview-test.client
    container_name: frontend
    depends_on:
      - gateway
    ports:
      - "4200:80"
    build:
      context: ./Interview-Test.Client
      dockerfile: Dockerfile
